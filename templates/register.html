<!DOCTYPE html>
<html>
<head>
    <title>Register Patient</title>
</head>
<body>
    <h1>Register New Patient</h1>
    <form method="POST">
        Name: <input type="text" name="name" required><br><br>
        Age: <input type="number" name="age" required><br><br>
        Symptoms: <input type="text" name="symptoms" placeholder="e.g. Headache, Fever" required><br><br>
        <button type="submit" style="padding:10px 20px;">Submit Patient</button>
    </form>
    <br>
    <a href="/">← Back to Home</a>
</body>
</html>
