<!DOCTYPE html>
<html>
<head>
    <title>Health Clinic Queue</title>
    <style>body{font-family: Arial; padding: 20px;}</style>
</head>
<body>
    <h1>🏥 Health Clinic - Queue Manager</h1>
    <p><strong>Today:</strong> {{ today_date }} | Patients seen today: <b>{{ total_seen }}</b></p>
    
    <h2>⏳ Current Waiting List (FIFO)</h2>
    <ol>
        {% for patient in queue %}
            <li>{{ patient }}</li>
        {% endfor %}
    </ol>
    
    <hr>
    <a href="/register"><button style="padding:10px 20px; font-size:18px;">➕ Register New Patient</button></a>
</body>
</html>
